import h5py, numpy as np

_joint_targets = None
def _load_joint_targets(path="/home/kimjimin/Desktop/joint0_demos.hdf5"):
    global _joint_targets
    if _joint_targets is None:
        with h5py.File(path, "r") as f:
            targets = []
            for i in range(f["data"].attrs["total_demos"]):
                targets.append(f[f"data/demo_{i}/target_joints"][:])  # [8]
        _joint_targets = np.mean(targets, axis=0)  # [8] 평균
        print(f"[목표 joints 로드] {np.round(np.degrees(_joint_targets), 1)}")
    return _joint_targets

def joint0_imitation_reward(env: ManagerBasedRLEnv, asset_cfg: SceneEntityCfg) -> torch.Tensor:
    """모든 joint가 목표값에 가까울수록 보상"""
    asset = env.scene[asset_cfg.name]
    joint_pos = asset.data.joint_pos  # [num_envs, 8]

    targets = _load_joint_targets()
    target_tensor = torch.tensor(targets, device=joint_pos.device, dtype=torch.float32)

    # 모든 joint 거리 합산
    dist = torch.abs(joint_pos - target_tensor.unsqueeze(0))  # [num_envs, 8]
    mean_dist = dist.mean(dim=1)                               # [num_envs]
    return 1.0 - torch.tanh(mean_dist / 0.1)
